name: Publish GeoElementor Update

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override plugin version (optional)"
        required: false
      channel:
        description: "Release channel"
        required: false
        default: "stable"
      rollout_percentage:
        description: "Rollout percentage (0-100)"
        required: false
        default: "100"
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: geo-elementor
      API_PUBLISH_URL: https://api.reactwoo.com/api/v5/updates/publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard assets
        run: npm run build

      - name: Create plugin zip
        run: npm run package:zip

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ github.event.inputs.version || '' }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(sed -n "s/^ \* Version: //p" elementor-geo-popup.php | head -n1 | tr -d '\r')"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Could not determine plugin version."
            exit 1
          fi

          MIN_PHP="$(sed -n "s/^ \* Requires PHP: //p" elementor-geo-popup.php | head -n1 | tr -d '\r')"
          TESTED_UP_TO="$(sed -n "s/^Tested up to: //p" readme.txt | head -n1 | tr -d '\r')"
          CHANNEL="${{ github.event.inputs.channel || 'stable' }}"
          ROLLOUT="${{ github.event.inputs.rollout_percentage || '100' }}"
          ARTIFACT_KEY="plugins/${PLUGIN_SLUG}/${VERSION}/${PLUGIN_SLUG}.zip"
          SHA256="$(sha256sum geo-elementor.zip | awk '{print $1}')"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "min_php=${MIN_PHP}" >> "$GITHUB_OUTPUT"
          echo "tested_up_to=${TESTED_UP_TO}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "rollout=${ROLLOUT}" >> "$GITHUB_OUTPUT"
          echo "artifact_key=${ARTIFACT_KEY}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS CLI for R2
        shell: bash
        run: |
          aws configure set aws_access_key_id "${{ secrets.R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          aws configure set region auto

      - name: Upload zip to R2
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp "geo-elementor.zip" "s3://${{ secrets.R2_BUCKET }}/${{ steps.meta.outputs.artifact_key }}" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

      - name: Publish release metadata to API
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD="$(cat <<EOF
          {
            "slug": "${PLUGIN_SLUG}",
            "version": "${{ steps.meta.outputs.version }}",
            "channel": "${{ steps.meta.outputs.channel }}",
            "artifact_key": "${{ steps.meta.outputs.artifact_key }}",
            "sha256": "${{ steps.meta.outputs.sha256 }}",
            "min_php": "${{ steps.meta.outputs.min_php }}",
            "tested_up_to": "${{ steps.meta.outputs.tested_up_to }}",
            "rollout_percentage": ${{ steps.meta.outputs.rollout }}
          }
          EOF
          )"

          curl --fail-with-body -sS -X POST "${API_PUBLISH_URL}" \
            -H "Authorization: Bearer ${{ secrets.UPDATES_PUBLISH_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "${PAYLOAD}"
