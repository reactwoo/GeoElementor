name: Deploy to cPanel (future.livebuild.site)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy to cPanel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for potential artifacts)
        uses: actions/checkout@v4

      - name: Install SSH key (with passphrase)
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.CPANEL_SSH_KEY }}
          name: id_rsa
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          known_hosts: ""

      - name: Add host to known_hosts
        env:
          CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$CPANEL_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy (git fetch/reset on server)
        env:
          CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          CPANEL_SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
          CPANEL_BRANCH: ${{ secrets.CPANEL_BRANCH }}
        run: |
          ssh -p "${CPANEL_SSH_PORT:-22}" -i ~/.ssh/id_rsa "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}" "\
            set -e; \
            if [ ! -d \"${CPANEL_REPO_PATH}/.git\" ]; then \
              echo 'Repository not found at ${CPANEL_REPO_PATH}'; \
              exit 1; \
            fi; \
            cd ${CPANEL_REPO_PATH}; \
            git fetch --all; \
            git reset --hard origin/${CPANEL_BRANCH:-main}; \
          "

      # Optional build step on the server (uncomment if needed)
      # - name: Build on server (composer/npm)
      #   env:
      #     CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
      #     CPANEL_SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
      #     CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
      #     CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
      #   run: |
      #     ssh -p "${CPANEL_SSH_PORT:-22}" -i ~/.ssh/id_rsa "${CPANEL_SSH_USER}@${CPANEL_SSH_HOST}" "\
      #       set -e; \
      #       cd ${CPANEL_REPO_PATH}; \
      #       # composer install --no-dev --prefer-dist --no-interaction; \
      #       # npm ci && npm run build; \
      #     "
